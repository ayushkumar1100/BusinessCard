<!DOCTYPE html>
<html>
<head>
    <title>Digital Card</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            margin: auto;

        }
</style>
</head>
<body>

<div class="card">
    <h2 id="name"></h2>
    <p id="email"></p>
    <p id="phone"></p>
    <p id="company"></p>
</div>
<script>
const params = new URLSearchParams(window.location.search)
const id = params.get("id")

console.log("ID:", id) 

fetch(`https://businesscard-5d93.onrender.com/api/card/${id}`)
.then(res => res.json())
.then(data => {
    console.log("DATA:", data) 

    document.getElementById("name").innerText = data.name || "No Name"
    document.getElementById("email").innerText = data.email || "No Email"
    document.getElementById("phone").innerText = data.phone || "No Phone"
    document.getElementById("company").innerText = data.company || "No Company"
})
.catch(err => {
    console.error(err)
})
</script>

</body>
</html>
