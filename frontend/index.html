<!DOCTYPE html>
<html>
    <head>
        <title>Digital Business Card</title>
        <style>
            body {
                font-family: 'Segoe UI', sans-serif;
                background: #f5f7fb;
                margin: 0;
                padding: 20px;
            }

            .container {
                display: flex;
                gap: 30px;
                justify-content: center;
            }

            .box {
                background: white;
                padding: 20px;
                border-radius: 15px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                width: 300px;
            }

            h2 {
                margin-bottom: 15px;
            }

            input {
                width: 100%;
                padding: 10px;
                margin-bottom: 10px;
                border-radius: 8px;
                border: 1px solid #ddd;
                outline: none;
            }

            input:focus {
                border-color: #4a90e2;
            }

            button {
                width: 100%;
                padding: 10px;
                border: none;
                border-radius: 8px;
                background: #4a90e2;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #357abd;
            }

            .card {
                background: linear-gradient(135deg, #4a90e2, #6fc3ff);
                color: white;
                padding: 15px;
                border-radius: 12px;
                margin-bottom: 10px;
            }

            .card h3 {
                margin: 0;
            }

            .card p {
                margin: 5px 0;
                font-size: 14px;
            }

            #message {
                color: green;
                font-size: 14px;
            }
        </style>
    </head>

    <body>

        <div class="container">

            <div class="box">
                <h2>Login</h2>
                <input id="loginEmail" placeholder="Email">
                <input id="loginPassword" type="password" placeholder="Password">
                <button onclick="login()">Login</button>
                <p id="loginMessage"></p>
            </div>

            <div class="box">
                <h2>Create Card</h2>
                <input id="name" placeholder="Name" oninput="preview()">
                <input id="email" placeholder="Email" oninput="preview()">
                <input id="phone" placeholder="Phone" oninput="preview()">
                <input id="company" placeholder="Company" oninput="preview()">
                <button id="saveBtn" onclick="createCard()">Save Card</button>
                <p id="message"></p>
            </div>

            <div class="box">
                <h2>Preview</h2>
                <div class="card">
                    <h3 id="p_name">Your Name</h3>
                    <p id="p_email">Email</p>
                    <p id="p_phone">Phone</p>
                    <p id="p_company">Company</p>
                </div>
            </div>

            <div class="box">
                <h2>Your Cards</h2>
                <div id="cardsContainer"></div>
            </div>

        </div>

        <script>


            async function login(){
                const email = document.getElementById("loginEmail").value
                const password = document.getElementById("loginPassword").value

                const res = await fetch("http://localhost:3000/api/login", {
                    method: "POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({email,password})
                })

                const user = await res.json()

                if(user._id){
                    localStorage.setItem("userId",user._id)
                    document.getElementById("loginMessage").innerText="Login Successful"
                    loadCards()
                }
                else{
                    document.getElementById("loginMessage").innerText="Invalid Credentials"
                }
            }

            function preview(){
                document.getElementById("p_name").innerText=document.getElementById("name").value
                document.getElementById("p_email").innerText=document.getElementById("email").value
                document.getElementById("p_phone").innerText=document.getElementById("phone").value
                document.getElementById("p_company").innerText = document.getElementById("company").value
            }


            async function createCard(){
                const userId = localStorage.getItem("userId")
                const name = document.getElementById("name").value
                const email = document.getElementById("email").value
                const phone = document.getElementById("phone").value
                const company = document.getElementById("company").value
                if (!name || !email || !phone || !company) {
                    alert("All fields are required")
                    return
                }
                

                await fetch("http://localhost:3000/api/card/",{
                    method: "POST",
                    headers:{
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone,
                        company,
                        theme: "light",
                        userId
                    })
                })

                document.getElementById("message").innerText = "Card Saved Successfully"

                loadCards()
            }

            async function loadCards(){
                const userId = localStorage.getItem("userId")
                if(!userId){
                    console.log("User not logged in")
                    return
                }
                const response = await fetch(`http://localhost:3000/api/card/${userId}`)
                const cards = await response.json()

                const container = document.getElementById("cardsContainer")
                container.innerHTML = ""

                cards.forEach(card=>{

                    const div = document.createElement("div")
                    div.className = "card"

                    div.innerHTML=`
                        <h3>${card.name}</h3>
                        <P>${card.email}</p>
                        <p>${card.phone}</p>
                        <p>${card.company}</p>   
                    `

                    container.appendChild(div)

                })    
                
            }

            

            
        </script>
    </body>
</html>
