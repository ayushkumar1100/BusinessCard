<!DOCTYPE html>
<html>
    <head>
        <title>Digital Business Card</title>
        <style>
            body{
                font-family: Arial;
                display: flex;
                gap: 50px;
                padding:20px
            }

            .form, .preview, .saved{
                width: 300px;
            }

            .card{
                border: 1px solid black;
                padding: 15px;
                border-radius: 10px;
                margin-bottom: 10px;
            }
        </style>
    </head>

    <body>
        <div class="form">
            <h2>Create Business Card</h2>

            <input type="text" id="name" placeholder="Name" oninput="preview()"><br><br>
            <input type="email" id="email" placeholder="Email" oninput="preview()"><br><br>
            <input type="text" id="phone" placeholder="Phone" oninput="preview()"><br><br>
            <input type="text" id="company" placeholder="Company" oninput="preview()"><br><br>

            <button onclick="createCard()">Save Card</button>

            <p id="message"></p>

        </div>

        <div class="preview">
            <h2>Live Preview</h2>

            <div class="card">
                <h3 id="p_name">Your Name</h3>
                <p id="p_email">Email</p>
                <p id="p_phone">Phone</p>
                <p id="p_company">Company</p>
            </div>
        </div>


        <div class="saved">
            <h2>Your Card</h2>
            <div id="cardsContainer"></div>
        </div>

        <script>

            function preview(){
                document.getElementById("p_name").innerText=document.getElementById("name").value
                document.getElementById("p_email").innerText=document.getElementById("email").value
                document.getElementById("p_phone").innerText=document.getElementById("phone").value
                document.getElementById("p_company").innerText = document.getElementById("company").value
            }


            async function createCard(){
                const name = document.getElementById("name").value
                const email = document.getElementById("email").value
                const phone = document.getElementById("phone").value
                const company = document.getElementById("company").value

                await fetch("http://localhost:3000/api/card/",{
                    method: "POST",
                    headers:{
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone,
                        company,
                        theme: "dark"
                    })
                })

                document.getElementById("message").innerText = "Card Saved Successfully"

                loadCards()
            }

            async function loadCards(){
                const response = await fetch("http://localhost:3000/api/card")
                const card = await response.json()

                const container = document.getElementById("cardsContainer")
                container.innerHTML = ""

                if(!card) return

                const div = document.createElement("div")
                div.className = "card"

                div.innerHTML=`
                    <h3>${card.name}</h3>
                    <P>${card.email}</p>
                    <p>${card.phone}</p>
                    <p>${card.company}</p>   
                `

                container.appendChild(div)
                
            }

            
        </script>
    </body>
</html>
