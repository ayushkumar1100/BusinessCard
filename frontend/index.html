<!DOCTYPE html>
<html>
    <head>
        <title>Digital Business Card</title>
        <style>
            body{
                font-family: Arial;
                display: flex;
                gap: 50px;
                padding:20px
            }

            .form, .preview, .saved{
                width: 300px;
            }

            .card{
                border: 1px solid black;
                padding: 15px;
                border-radius: 10px;
                margin-bottom: 10px;
            }

            .login-box {
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 200px;
            }
        </style>
    </head>

    <body>

        <div class="login-box">
            <h2>Login</h2>

            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">

            <button onclick="login()">Login</button>
            <p id="loginMessage"></p>
        </div>

        <p id="loginMessage"></p>

        <div class="form">
            <h2>Create Business Card</h2>

            <input type="text" id="name" placeholder="Name" oninput="preview()"><br><br>
            <input type="email" id="email" placeholder="Email" oninput="preview()"><br><br>
            <input type="text" id="phone" placeholder="Phone" oninput="preview()"><br><br>
            <input type="text" id="company" placeholder="Company" oninput="preview()"><br><br>

            <button onclick="createCard()">Save Card</button>

            <p id="message"></p>

        </div>

        <div class="preview">
            <h2>Live Preview</h2>

            <div class="card">
                <h3 id="p_name">Your Name</h3>
                <p id="p_email">Email</p>
                <p id="p_phone">Phone</p>
                <p id="p_company">Company</p>
            </div>
        </div>


        <div class="saved">
            <h2>Your Card</h2>
            <div id="cardsContainer"></div>
        </div>

        <script>


            async function login(){
                const email = document.getElementById("loginEmail").value
                const password = document.getElementById("loginPassword").value

                const res = await fetch("http://localhost:3000/api/login", {
                    method: "POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({email,password})
                })

                const user = await res.json()

                if(user._id){
                    localStorage.setItem("userId",user._id)
                    document.getElementById("loginMessage").innerText="Login Successful"
                    loadCards()
                }
                else{
                    document.getElementById("loginMessage").innerText="Invalid Credentials"
                }
            }

            function preview(){
                document.getElementById("p_name").innerText=document.getElementById("name").value
                document.getElementById("p_email").innerText=document.getElementById("email").value
                document.getElementById("p_phone").innerText=document.getElementById("phone").value
                document.getElementById("p_company").innerText = document.getElementById("company").value
            }


            async function createCard(){
                const userId = localStorage.getItem("userId")
                const name = document.getElementById("name").value
                const email = document.getElementById("email").value
                const phone = document.getElementById("phone").value
                const company = document.getElementById("company").value
                if (!name || !email || !phone || !company) {
                    alert("All fields are required")
                    return
                }
                

                await fetch("http://localhost:3000/api/card/",{
                    method: "POST",
                    headers:{
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone,
                        company,
                        theme: "light",
                        userId
                    })
                })

                document.getElementById("message").innerText = "Card Saved Successfully"

                loadCards()
            }

            async function loadCards(){
                const userId = localStorage.getItem("userId")
                if(!userId){
                    console.log("User not logged in")
                    return
                }
                const response = await fetch(`http://localhost:3000/api/card/${userId}`)
                const cards = await response.json()

                const container = document.getElementById("cardsContainer")
                container.innerHTML = ""

                cards.forEach(card=>{

                    const div = document.createElement("div")
                    div.className = "card"

                    div.innerHTML=`
                        <h3>${card.name}</h3>
                        <P>${card.email}</p>
                        <p>${card.phone}</p>
                        <p>${card.company}</p>   
                    `

                    container.appendChild(div)

                })    
                
            }

            

            
        </script>
    </body>
</html>
